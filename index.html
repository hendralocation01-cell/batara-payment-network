}

section{
padding:50px 20px;

}

.judul{

font-size:32px;
margin-bottom:35px;

}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.card{

padding:25px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
text-align:center;
}

.card h3{
margin:15px 0;
color:#0d6efd;
}
